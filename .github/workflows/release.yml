name: release-gui

# Builds the downloadable "Moon Cresta Disk Builder" GUI for Windows, macOS and
# Linux. Each executable bundles the ROM-free program (no copyrighted ROM); the
# user supplies their own MAME romset at runtime. Trigger by pushing a tag like
# v1.0, or run manually from the Actions tab.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # 1) Build the ROM-free Amiga program + bootable ADF (these get bundled).
  amiga:
    runs-on: ubuntu-latest
    container: amigadev/crosstools:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ROM-free program + ADF
        run: |
          apt-get update -y && apt-get install -y python3 python3-pip
          pip3 install --break-system-packages amitools machine68k 2>/dev/null || pip3 install amitools machine68k
          export PATH="/opt/amiga/bin:$PATH"
          make GAME=mooncrst adf
      - uses: actions/upload-artifact@v4
        with:
          name: romfree
          path: |
            build/mooncrst
            build/mooncrst.adf

  # 2) Bundle the GUI into a standalone executable per OS.
  gui:
    needs: amiga
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: MoonCrestaDiskBuilder-windows.exe
            out: gui_dist/MoonCrestaDiskBuilder.exe
          - os: macos-latest
            asset: MoonCrestaDiskBuilder-macos
            out: gui_dist/MoonCrestaDiskBuilder
          - os: ubuntu-latest
            asset: MoonCrestaDiskBuilder-linux
            out: gui_dist/MoonCrestaDiskBuilder
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Get the ROM-free program
        uses: actions/download-artifact@v4
        with:
          name: romfree
          path: build
      - name: Install build deps
        run: pip install pyinstaller amitools machine68k
      - name: Build executable
        run: pyinstaller tools/packager.spec --distpath gui_dist --workpath gui_build --noconfirm
      - name: Rename for upload
        shell: bash
        run: cp "${{ matrix.out }}" "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
