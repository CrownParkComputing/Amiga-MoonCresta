name: build

# The program is ROM-free (it loads mooncrst.rom at runtime), so the ROM-free
# ADF is built and published on every push. The ROM is copyrighted and is NOT
# in the repo -- to also smoke-test the release packager (tools/build_release.py
# -> ADF + HD drawer + LHA) the maintainer can add their own ROM set as a
# base64 secret (MOONCRESTA_ROM_B64 = base64 of a tar.gz expanding to
# games/mooncrst/{roms,gfx,mmi6331.6l}). ROM-containing outputs are NEVER
# uploaded (public artifacts would redistribute the ROM); only the ROM-free
# ADF is published.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: amigadev/crosstools:latest      # m68k-amigaos-gcc + vasm + vlink
    steps:
      - uses: actions/checkout@v4

      - name: Host tools
        run: |
          apt-get update -y
          apt-get install -y python3 python3-pip
          # A creating-capable LhA (jlha-utils) so the packager can build any of
          # ADF / HD / LHA. lhasa is the extract-only fallback.
          apt-get install -y jlha-utils || apt-get install -y lhasa || true
          pip3 install --break-system-packages amitools machine68k 2>/dev/null \
            || pip3 install amitools machine68k

      - name: Build ROM-free program + ADF
        run: |
          export PATH="/opt/amiga/bin:$PATH"
          make GAME=mooncrst adf

      - name: Upload ROM-free ADF
        uses: actions/upload-artifact@v4
        with:
          name: mooncrst-adf-romfree
          path: build/mooncrst.adf      # ROM-free: drop your own mooncrst.rom in the root

      - name: Smoke-test the release packager (only if ROM secret is configured)
        env:
          ROM_B64: ${{ secrets.MOONCRESTA_ROM_B64 }}
        run: |
          if [ -z "$ROM_B64" ]; then
            echo "No MOONCRESTA_ROM_B64 secret -> skipping packager smoke test."
            exit 0
          fi
          echo "$ROM_B64" | base64 -d > /tmp/rom.tar.gz
          tar xzf /tmp/rom.tar.gz                       # -> games/mooncrst/{roms,gfx,mmi6331.6l}
          export PATH="/opt/amiga/bin:$PATH"
          python3 tools/build_release.py games/mooncrst --no-build
          echo "=== produced (NOT uploaded -- contains the ROM) ==="
          ls -la dist/
          if [ -f dist/MoonCresta.lha ]; then (lha l dist/MoonCresta.lha || jlha l dist/MoonCresta.lha) || true; fi
