name: build

# Lightweight CI: host-compile the portable cores and syntax-check the Python
# tools on every push. The full Amiga build needs Bebbo's m68k toolchain
# (gcc -noixemul + vasm + vlink) which is built locally; the resulting ROM-free
# program is committed under prebuilt/ and published here as an artifact. (The
# downloadable GUI is built by release-gui.yml.)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Host compile-check the portable cores
        run: |
          gcc -O2 -Isrc/cores -Isrc/hal -c src/cores/z80.c    -o /tmp/z80.o
          gcc -O2 -Isrc/cores -Isrc/hal -c src/hal/machine.c  -o /tmp/machine.o
          gcc -O2 -Isrc/cores -Isrc/hal -c src/hal/mc_render.c -o /tmp/mc_render.o
          echo "Cores compile."

      - name: Syntax-check the Python tools
        run: python3 -m py_compile tools/mc_pack.py tools/build_release.py tools/gui_packager.py tools/make_rom.py

      - name: Publish the ROM-free ADF
        uses: actions/upload-artifact@v4
        with:
          name: mooncrst-adf-romfree
          path: prebuilt/mooncrst.adf   # ROM-free: add your own mooncrst.rom, or use the Disk Builder
